<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de imagens de fundo</title>
    <style>
        div.quadrado {
            display: inline-block;
            border:  1px solid black;
            border-radius: 10px;
            width: 300px;
            height: 300px;
            background-color: lightgray;
        }

        body {
            background-image: url('imagens/wallpaper004.jpg');
                background-size: cover;
                background-attachment: fixed;
        }

        div#q1 {
            background-color: rgb(165, 230, 255);
        }

        div#q2 {
            background-image: linear-gradient(to bottom, rgb(8, 0, 85), rgb(95, 7, 136), rgb(155, 6, 224));
        }

        div#q3 {
            background-image: url('imagens/pattern004.png');
            
        }

        div#q4 {
            background-image: linear-gradient(to bottom, rgb(255, 200, 18) 20%, rgb(255, 252, 50), rgb(255, 246, 169));
        }
    </style>
</head>
<body>
    <div class="quadrado" id="q1">

    </div >
    <div class="quadrado" id="q2">
        
    </div>
    <div class="quadrado" id="q3">

    </div>

    <div class="quadrado" id="q4">
