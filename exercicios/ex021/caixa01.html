<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo de caixas</title>
    <style>
      h1 {
        background-color: lightgray;
        text-align: center;
        box-shadow: 10px 10px 10px rgb(109, 109, 109);
        margin: auto;

        height: 300px;
        width: 300px;

        border-radius: 15px;
        border: 5px solid darkgray;

        padding: 10px;

        outline: 3px dashed black;
      }

      a {
        border: 3px solid black;
        border-radius: 10px;
        text-decoration: none;
        color: gray;
      }

      p {
        text-align: center;
        margin-top: 50px;
        margin-right: 50px;
        margin-bottom: 50px;
        margin-left: 50px;
      }
    </style>
  </head>
  <body>
    <h1>Exemplo de caixa box-level</h1>
    <p>
      Páragrafos também são exemplos de box-level, mas os
      <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como
      tudo isso funciona.
    </p>
  </body>
</html>
