<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>desafio005</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background-color: rgb(241, 241, 241);
        font-family: Arial, Helvetica, sans-serif;
      }

      table {
        border-collapse: collapse;
        width: 580px;
        margin: 100px auto;
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.349);
      }
      th,
      td {
        border: 1px solid black;
        text-align: center;
        padding: 10px;
      }
      .cinza {
        background-color: rgb(136, 136, 136);
        font-weight: bold;
        text-transform: uppercase;
        color: white;
        font-size: 1.4em;
      }

      .media {
        text-align: left;
        background-color: rgb(136, 136, 136);
        color: white;
        font-weight: bold;
        font-size: 1.4em;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th scope="row" class="cinza" rowspan="2">Área</th>
          <th scope="row" class="cinza" rowspan="2">Disciplina</th>
          <th scope="rowgroup" class="cinza" colspan="2">Notas</th>
          <th scope="row" class="cinza" rowspan="2">Média</th>
        </tr>
        <tr>
          <th scope="row" class="cinza">Notas 1</th>
          <th scope="row" class="cinza">Notas 2</th>
        </tr>
      </thead>
      <tfoot></tfoot>
      <tbody>
        <th rowspan="5">Exatas</th>
        <tr>
          <td>Matemática</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Física</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Química</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Biologia</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td class="media" class="cinza" colspan="4">Média de exatas</td>
          <td class="cinza">0.0</td>
        </tr>
        <th rowspan="3">Humanas</th>
        <tr>
          <td>Historia</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Geografia</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td class="media" class="cinza" colspan="4">Média de humanas</td>
          <td class="cinza">0.0</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
