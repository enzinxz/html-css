<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio de tabela</title>
    <style>
      table {
        border-collapse: collapse;
        background-color: white;
        width: 500px;
        padding-bottom: 100px;
        margin-bottom: 100px;
      }

      td {
        border: 1px solid black;
        text-align: center;
        padding: 10px;
      }

      tr {
        text-align: center;
      }

      #table2 {
        border-collapse: collapse;
        background-color: white;
        width: 500px;
        background-color: rgb(218, 218, 218);
        font-weight: bold;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <h1>Desafio de Tabela 1</h1>
    <table>
      <tr>
        <td>1</td>
        <td>2</td>
        <td rowspan="2">3</td>
        <td>4</td>
      </tr>
      <tr>
        <td>5</td>
        <td>6</td>
        <td>7</td>
      </tr>
      <tr>
        <td colspan="3">8</td>
        <td>9</td>
      </tr>
      <tr>
        <td rowspan="2">10</td>
        <td colspan="2">11</td>
        <td>12</td>
      </tr>
      <tr>
        <td>13</td>
        <td>14</td>
        <td>15</td>
      </tr>
    </table>

    <h1>Desafio de Tabela 2</h1>


    <table id="table2">
      <tr>
        <td colspan="4">a</td>
        <td rowspan="4">b</td>
      </tr>
      <tr>
        <td rowspan="4">c</td>
        <td>d</td>
        <td>e</td>
        <td>f</td>
      </tr>
      <tr>
        <td>g</td>
        <td>h</td>
        <td>i</td>
      </tr>
      <tr>
        <td>j</td>
        <td>l</td>
        <td>m</td>
      </tr>
      <tr>
        <td colspan="4">n</td>
      </tr>
    </table>
  </body>
</html>
