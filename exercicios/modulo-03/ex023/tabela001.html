<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas</title>
    <style>
      body {
        background-image: linear-gradient(to bottom, rgb(85, 85, 85), rgb(184, 184, 184), gray);
        font-family: Arial, Helvetica, sans-serif;
        position: relative;
        height: 100vh;
      }

      table {
        width: 400px;
        height: 400px;
        border-collapse: collapse;
        background-color: white;
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.281);

        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      td {
        border: 1px solid black;
        text-align: center;
        vertical-align: top;
        padding: 10px;
      }

      h1 {
        text-align: center;
        padding-top: 200px;
      }
    </style>
  </head>
  <body>
    <h1>Minha primeira tabela</h1>
    <table>
      <tr>
        <td>A1</td>
        <td>B1</td>
        <td>C1</td>
      </tr>
      <tr>
        <td>A2</td>
        <td>B2</td>
        <td>C2</td>
      </tr>
      <tr>
        <td>A3</td>
        <td>B3</td>
        <td>C3</td>
      </tr>
      <tr>
        <td>A4</td>
        <td>B4</td>
        <td>C4</td>
      </tr>
    </table>
  </body>
</html>
