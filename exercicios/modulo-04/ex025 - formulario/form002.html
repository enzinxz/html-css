<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de formulário</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="post">
        <p>
            <label for="iusu">Usuário:</label><br>
            <input type="text" name="usu" id="iusu" required minlength="3" maxlength="20" size="20" placeholder="usarname" autocomplete="username">
        </p>
        <p>
            <label for="isen">Senha:</label><br>
            <input type="password" name="sen" id="isen" required
            min="8" maxlength="20" size="20" placeholder="Password" autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
