<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout na prática</title>
    <style>
      body {
        background-color: rgb(70, 62, 80);
      }



      div.container {
        border: 3px solid rgb(0, 0, 0);
        background-color: rgb(255, 255, 255);
        height: 350px;
        display: grid;
        grid-template: repeat(3, 1fr) / repeat(3, 1fr);
        /* grid-template: auto auto auto / auto auto auto;  */
        gap: 10px;
        place-items: normal  normal;
        place-content: normal  normal;
      
        /* place-items: center  normal;
        place-content: normal  center; */

      }

      div.item {
        border: 3px solid rgb(156, 156, 156);
        background-color: rgb(226, 226, 226);
        padding: 5px;
        display: flex;
        place-items: center  normal;
        place-content: normal  center;
      }
      div.item1 {
        border: 3px solid black;
        background-color: rgb(184, 184, 184);
        color: white;
        text-decoration: underline;
        font-weight: bold;
        padding: 5px;
        display: flex;
        place-items: center  normal;
        place-content: normal  center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item1">A</div>
      <div class="item">B</div>
      <div class="item1">C</div>
      <div class="item">D</div>
      <div class="item1">E</div>
      <div class="item">F</div>
      <div class="item1">G</div>
      <div class="item">H</div>
      <div class="item1">I</div>
    </div>
  </body>
</html>
