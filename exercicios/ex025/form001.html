<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(
          135deg,
          #ffe6c2,
          rgb(255, 210, 125),
          #fff2e1);
        min-height: 100vh;
      }

      input {
        background-color: beige;
      }

      input, p {
        border-radius: 10px;
        padding: 5px;
        font-weight: bold;
        font-size: 20px;
      }

      input:hover {
        background-color: rgb(250, 237, 202);
        transition: all 200ms;
        cursor: pointer;
      }

      input[type="submit"] {
        cursor: pointer;
        background-image: linear-gradient(
          to right,
          rgb(252, 40, 68),
          rgb(255, 174, 0),
          rgb(255, 217, 0)
        );
        padding-left: 60px;
        padding-right: 60px;
        color: white;
        text-shadow: 2px 2px 10px white;
      }

      .enviar {
        text-align: center;
        display: flex;
        justify-content: center;
      }

      input[type="submit"]:hover {
        color: rgb(216, 216, 216);
        transition: all 200ms;
        transform: translate(-0.7px, -0.7px);
        box-shadow: 0px 10px 10px rgba(255, 175, 55, 0.384);
      }


      h1 {
        padding-bottom: 40px;
        text-align: left;
      }

      p {
        text-align: left;
      }

      main {
        background-color: white;
        text-align: center;
        border-radius: 15px;
        padding: 40px;
        position: absolute;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 10px 10px 10px rgba(250, 173, 31, 0.486);
      }

      p {
        padding-bottom: 20px;
      }


    </style>
  </head>
  <body>
    <main>
      <h1>Cadastro</h1>
      <form action="cadastro.php" method="post" autocomplete="off">
            <p>
            <label for="inome">nome</label> <br/>
            <input
            type="text"
            name="nome"
            id="inome"
            placeholder="name" 
            />
            </p>


            <p>
              <label for="isobrenome">Sobrenome</label> <br />
              <input
                type="text"
                name="sobrenome"
                id="isobrenome"
                placeholder="surname"
              />
            </p>

        <div class="enviar">
          <p><input type="submit" value="Enviar" /></p>

      </form>
    </main>
  </body>
</html>
