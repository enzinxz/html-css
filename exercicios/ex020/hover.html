<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de Hover</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      div > p{
        display: none
      }

      div:hover > p{
        display: block;
        color: rgb(0, 0, 0);
        background-color: bisque;
        width: 300px;
    
      }


      div:hover {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Exemplo de hover</h1>
    <p>Passe o cursor sobre o texto abaixo</p>
    <div>Passe o mouse aqui
        <p>TEXTO ESCNDIDO</p>

    </div>
    <p>Fim do exemplo
  </body>
</html>
