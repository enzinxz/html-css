<!DOCTYPE html>
<htm lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        div.container {
            background-color: slategray;

            display: flex;
            flex-flow: row nowrap;
            justify-content: center;

        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 150px; 
        }
    </style>
</head>
<body>
    <div>
        <div class="container">
            <div class="item">Avestruz</div>
            <div class="item">Babuino muito gordo</div>
            <div class="item">C</div>
            <div class="item">D</div>
            <div class="item">Enzo sigma farma aura</div>
            <div class="item">Fael pagotti</div>
            <div class="item">Gheraldo</div>
        </div>
    </div>
</body>
</htm>
