<!doctype html>
<htm lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible box</title>
    <style>
        div.container {
          background-color: slategray;

          display: flex;
          flex-flow: row nowrap;
          align-items: stretch;
          height: 400px;
          

        }

        div.item {
          background-color: lightskyblue;
          border: 1px solid black;

          padding: 28.7px;
          
        }

      div#i1 {
        align-self: auto;
        display: flex;
        align-items: center;
      }
      div#i2 {
        align-self: center;
      }
      div#i3 {
        align-self: flex-end;
      }
      div#i4 {
        align-self:stretch;
        display: flex;
        align-items: center;
      }
      div#i5 {
        align-self: center;
      }
      div#i6 {
        align-self: flex-end;
      }
      div#i7 {
        align-self: stretch;
        display: flex;
        align-items: center;
      }
      div#i8 {
        align-self: center;
      }
      div#i9 {
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
        <div class="item" id="i8">H</div>
        <div class="item" id="i9">I</div>
      </div>
    </div>
  </body>
</htm>
