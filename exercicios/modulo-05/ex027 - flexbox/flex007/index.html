<!doctype html>
<htm lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible box</title>
    <style>
      div.container {
        background-color: slategray;

        display: flex;
        flex-flow: row wrap;
        justify-content: center;
        height: 500px;
        align-items: stretch;
        border-radius: 10px;
        
        
      }

      div.item {
        background-color: lightskyblue;
        border: 1px solid black;
        text-align: center;
        padding: 30px;
        border-radius: 10px;
        margin: 5px;
      }

    div#i1 {
        order: 0;
    }
    div#i2 {
        order: -2;
    }
    div#i3 {
        order: 4;
    }
    div#i4 {
        order: 8;
    }
    div#i5 {
        order: 2;
    }
    div#i6 {
        order: 0;
    }
    div#i7 {
        order: -4;
    }

    
    </style>
  </head>
  <body>
    <div>
      <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
      </div>
    </div>
  </body>
</htm>
